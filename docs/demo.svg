<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <radialGradient id="bg" cx="20%" cy="-10%" r="90%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="55%" stop-color="#0b1120"/>
    </radialGradient>
    <linearGradient id="userBubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Header -->
  <text x="40" y="46" fill="#818cf8" font-size="24">✦</text>
  <text x="68" y="44" fill="#f1f5f9" font-size="20" font-weight="700">Lumen</text>
  <circle cx="1040" cy="40" r="5" fill="#34d399"/>
  <text x="1054" y="45" fill="#94a3b8" font-size="13">claude-haiku-4-5</text>
  <line x1="0" y1="72" x2="1200" y2="72" stroke="#1e293b"/>

  <!-- User question (always visible) -->
  <rect x="640" y="104" width="520" height="42" rx="14" fill="url(#userBubble)"/>
  <text x="662" y="130" fill="#ffffff" font-size="14">How do plants make food and what releases oxygen?</text>

  <!-- Assistant answer container -->
  <rect x="40" y="174" width="700" height="168" rx="14" fill="#0f172a" stroke="#1e293b"/>

  <!-- Answer lines: each fades in on the shared 9s timeline to mimic token streaming -->
  <text x="64" y="206" fill="#e2e8f0" font-size="14">Plants make food through photosynthesis, a process where green
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
             values="0;0;1;1;0" keyTimes="0;0.06;0.09;0.9;1"/>
  </text>
  <text x="64" y="230" fill="#e2e8f0" font-size="14">plants convert light energy into chemical energy stored in
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
             values="0;0;1;1;0" keyTimes="0;0.18;0.21;0.9;1"/>
  </text>
  <text x="64" y="254" fill="#e2e8f0" font-size="14">glucose <tspan fill="#818cf8" font-weight="700">[1]</tspan>. It takes place in chloroplasts using chlorophyll,
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
             values="0;0;1;1;0" keyTimes="0;0.30;0.33;0.9;1"/>
  </text>
  <text x="64" y="278" fill="#e2e8f0" font-size="14">and photosynthesis is responsible for the oxygen in the
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
             values="0;0;1;1;0" keyTimes="0;0.42;0.45;0.9;1"/>
  </text>
  <text x="64" y="302" fill="#e2e8f0" font-size="14">atmosphere <tspan fill="#818cf8" font-weight="700">[1]</tspan>.
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
             values="0;0;1;1;0" keyTimes="0;0.52;0.55;0.9;1"/>
  </text>

  <!-- Streaming caret -->
  <text x="150" y="302" fill="#818cf8" font-size="14" font-weight="700">▍
    <animate attributeName="opacity" dur="1s" repeatCount="indefinite" values="1;0.15;1"/>
  </text>

  <!-- Citation chip fades in after the answer -->
  <g>
    <rect x="40" y="360" width="240" height="30" rx="8" fill="#0f172a" stroke="#1e293b"/>
    <text x="54" y="380" font-size="12"><tspan fill="#818cf8" font-weight="700">[1]</tspan><tspan fill="#94a3b8"> Photosynthesis (biology primer)</tspan></text>
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
             values="0;0;1;1;0" keyTimes="0;0.60;0.64;0.9;1"/>
  </g>

  <text x="40" y="424" fill="#475569" font-size="12">↳ retrieved via BM25 · streamed token-by-token over SSE · grounded &amp; cited</text>
</svg>
