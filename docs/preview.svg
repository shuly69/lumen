<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <radialGradient id="bg" cx="20%" cy="-10%" r="90%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="55%" stop-color="#0b1120"/>
    </radialGradient>
    <linearGradient id="userBubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- Header -->
  <text x="40" y="52" fill="#818cf8" font-size="26">✦</text>
  <text x="70" y="50" fill="#f1f5f9" font-size="22" font-weight="700">Lumen</text>
  <text x="70" y="70" fill="#64748b" font-size="13">Grounded answers over your documents</text>
  <circle cx="1050" cy="46" r="5" fill="#34d399"/>
  <text x="1064" y="51" fill="#94a3b8" font-size="13">claude-haiku-4-5</text>
  <line x1="0" y1="92" x2="1200" y2="92" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== Left panel: Corpus ===== -->
  <rect x="0" y="92" width="320" height="668" fill="#0b1120" opacity="0.5"/>
  <line x1="320" y1="92" x2="320" y2="760" stroke="#1e293b" stroke-width="1"/>
  <text x="28" y="132" fill="#cbd5e1" font-size="12" font-weight="700" letter-spacing="1">CORPUS</text>
  <text x="28" y="150" fill="#64748b" font-size="12">3 docs · 6 chunks</text>
  <rect x="240" y="118" width="56" height="28" rx="8" fill="#6366f1"/>
  <text x="256" y="137" fill="#ffffff" font-size="12" font-weight="600">+ Add</text>

  <!-- Doc cards -->
  <g>
    <rect x="20" y="176" width="280" height="58" rx="10" fill="#0f172a" stroke="#1e293b"/>
    <text x="34" y="204" fill="#e2e8f0" font-size="14" font-weight="600">Photosynthesis (biology primer)</text>
    <text x="34" y="222" fill="#64748b" font-size="12">2 chunks · 812 chars</text>
  </g>
  <g>
    <rect x="20" y="244" width="280" height="58" rx="10" fill="#0f172a" stroke="#1e293b"/>
    <text x="34" y="272" fill="#e2e8f0" font-size="14" font-weight="600">The Roman aqueducts</text>
    <text x="34" y="290" fill="#64748b" font-size="12">2 chunks · 690 chars</text>
  </g>
  <g>
    <rect x="20" y="312" width="280" height="58" rx="10" fill="#0f172a" stroke="#1e293b"/>
    <text x="34" y="340" fill="#e2e8f0" font-size="14" font-weight="600">How compound interest works</text>
    <text x="34" y="358" fill="#64748b" font-size="12">2 chunks · 640 chars</text>
  </g>

  <!-- ===== Right panel: Chat ===== -->
  <!-- User question -->
  <rect x="720" y="150" width="440" height="44" rx="14" fill="url(#userBubble)"/>
  <text x="742" y="177" fill="#ffffff" font-size="14">How do plants make food and what releases oxygen?</text>

  <!-- Assistant answer -->
  <rect x="360" y="224" width="620" height="150" rx="14" fill="#0f172a" stroke="#1e293b"/>
  <text x="384" y="256" fill="#e2e8f0" font-size="14">
    <tspan x="384" dy="0">Plants make food through photosynthesis, a process where green</tspan>
    <tspan x="384" dy="22">plants convert light energy into chemical energy stored in</tspan>
    <tspan x="384" dy="22">glucose <tspan fill="#818cf8" font-weight="700">[1]</tspan>. It takes place in chloroplasts using chlorophyll,</tspan>
    <tspan x="384" dy="22">and photosynthesis is responsible for the oxygen in the</tspan>
    <tspan x="384" dy="22">atmosphere <tspan fill="#818cf8" font-weight="700">[1]</tspan>.<tspan fill="#818cf8" font-weight="700">▍</tspan></tspan>
  </text>

  <!-- Citation chips -->
  <g>
    <rect x="360" y="390" width="228" height="30" rx="8" fill="#0f172a" stroke="#1e293b"/>
    <text x="374" y="410" font-size="12">
      <tspan fill="#818cf8" font-weight="700">[1]</tspan>
      <tspan fill="#94a3b8"> Photosynthesis (biology primer)</tspan>
    </text>
  </g>

  <!-- Retrieval note -->
  <text x="360" y="452" fill="#475569" font-size="12">↳ retrieved via BM25 · answer streamed token-by-token over SSE · grounded &amp; cited</text>

  <!-- Input box -->
  <rect x="360" y="690" width="700" height="48" rx="14" fill="#0f172a" stroke="#334155"/>
  <text x="384" y="720" fill="#64748b" font-size="14">Ask a question about your documents…</text>
  <rect x="1074" y="690" width="86" height="48" rx="14" fill="#6366f1"/>
  <text x="1104" y="720" fill="#ffffff" font-size="14" font-weight="600">Ask</text>
</svg>
